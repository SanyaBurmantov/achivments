<html lang="ru" data-theme="light">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Резюме · Frontend Developer (Vue.js)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  /* ============ ПЕРЕМЕННЫЕ ТЕМЫ ============ */
  :root {
    --bg: #eef1f7;
    --bg-grad: radial-gradient(1200px 600px at 100% -10%, #e7e9ff 0%, transparent 55%),
               radial-gradient(900px 500px at -10% 110%, #dff5ef 0%, transparent 50%),
               #eef1f7;
    --surface: #ffffff;
    --surface-2: #f6f7fb;
    --text: #0f172a;
    --text-soft: #334155;
    --muted: #64748b;
    --border: #e6e8ef;
    --accent: #6366f1;
    --accent-2: #8b5cf6;
    --accent-soft: #eef0ff;
    --accent-ink: #4338ca;
    --chip-bg: #f1f3f9;
    --chip-text: #475569;
    --shadow: 0 1px 2px rgba(16,24,40,.04), 0 12px 32px rgba(16,24,40,.08);
    --shadow-sm: 0 1px 2px rgba(16,24,40,.06);
    --ring: rgba(99,102,241,.35);
  }
  [data-theme="dark"] {
    --bg: #0b1020;
    --bg-grad: radial-gradient(1100px 600px at 100% -10%, #1b1f3b 0%, transparent 55%),
               radial-gradient(900px 500px at -10% 110%, #0e2a26 0%, transparent 50%),
               #0b1020;
    --surface: #11162a;
    --surface-2: #0e1424;
    --text: #f1f5f9;
    --text-soft: #cbd5e1;
    --muted: #94a3b8;
    --border: #232a44;
    --accent: #818cf8;
    --accent-2: #a78bfa;
    --accent-soft: #1b2142;
    --accent-ink: #c7d2fe;
    --chip-bg: #1a2138;
    --chip-text: #b6c0d9;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 18px 40px rgba(0,0,0,.45);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
    --ring: rgba(129,140,248,.45);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-grad);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background .3s ease, color .3s ease;
  }

  /* ============ ПАНЕЛЬ УПРАВЛЕНИЯ ============ */
  .toolbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px clamp(16px, 4vw, 40px);
    background: color-mix(in srgb, var(--bg) 80%, transparent);
    backdrop-filter: saturate(160%) blur(12px);
    -webkit-backdrop-filter: saturate(160%) blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .toolbar .spacer { flex: 1; }
  .seg {
    display: inline-flex; background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 4px; box-shadow: var(--shadow-sm);
  }
  .seg button {
    border: 0; background: transparent; color: var(--muted);
    font: 600 13px/1 'Inter', sans-serif; padding: 8px 16px; border-radius: 999px;
    cursor: pointer; transition: all .18s ease; letter-spacing: .02em;
  }
  .seg button.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; box-shadow: 0 4px 12px var(--ring);
  }
  .seg button:not(.active):hover { color: var(--text); }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-soft);
    font: 600 13px/1 'Inter', sans-serif; padding: 10px 14px; border-radius: 10px;
    cursor: pointer; box-shadow: var(--shadow-sm); transition: all .18s ease;
  }
  .btn:hover { transform: translateY(-1px); border-color: var(--accent); color: var(--text); }
  .btn svg { width: 16px; height: 16px; }
  .btn.primary {
    border-color: transparent; color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 6px 16px var(--ring);
  }
  .btn.primary.alt { background: linear-gradient(135deg, #0d9488, #14b8a6); box-shadow: 0 6px 16px rgba(13,148,136,.3); }
  .icon-btn {
    width: 40px; height: 40px; padding: 0; justify-content: center;
    border-radius: 10px;
  }

  /* ============ СТРАНИЦА ============ */
  .page {
    max-width: 980px; margin: 28px auto 60px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 22px; box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* ---- ШАПКА ---- */
  .hero {
    position: relative; padding: clamp(28px, 5vw, 52px) clamp(24px, 5vw, 56px) 32px;
    background:
      radial-gradient(600px 240px at 88% -40%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 70%),
      var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .hero .name {
    font-size: clamp(30px, 6vw, 46px); font-weight: 900; letter-spacing: -.02em; margin: 0;
    background: linear-gradient(120deg, var(--accent), var(--accent-2) 70%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero .role {
    margin: 8px 0 0; font-size: clamp(15px, 2.4vw, 18px); font-weight: 600; color: var(--text-soft);
  }
  .hero .role .dot { color: var(--accent); margin: 0 8px; }
  .contacts { display: flex; flex-wrap: wrap; gap: 8px 10px; margin-top: 20px; }
  .contact {
    display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
    color: var(--text-soft); background: var(--surface-2); border: 1px solid var(--border);
    padding: 7px 12px; border-radius: 999px; font-size: 13px; font-weight: 500;
    transition: all .16s ease;
  }
  .contact:hover { border-color: var(--accent); color: var(--text); transform: translateY(-1px); }
  .contact svg { width: 15px; height: 15px; color: var(--accent); flex: none; }

  /* ---- МЕТРИКИ ---- */
  .metrics {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-top: 28px;
  }
  .metric {
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border: 1px solid var(--border); border-radius: 14px; padding: 16px 14px; text-align: center;
    transition: transform .16s ease, box-shadow .16s ease;
  }
  .metric:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
  .metric .v {
    font-size: clamp(22px, 3.6vw, 28px); font-weight: 800; letter-spacing: -.02em;
    background: linear-gradient(120deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .metric .l { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500; }

  /* ---- ТЕЛО ---- */
  .body { padding: clamp(26px, 4.5vw, 44px) clamp(24px, 5vw, 56px) clamp(34px, 5vw, 54px); }
  section { margin-top: 38px; }
  section:first-child { margin-top: 0; }
  .sec-title {
    display: flex; align-items: center; gap: 12px; margin: 0 0 18px;
    font-size: 13px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent-ink);
  }
  .sec-title::before {
    content: ""; width: 26px; height: 3px; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
  }
  .sec-title::after {
    content: ""; flex: 1; height: 1px; background: var(--border);
  }

  .summary { font-size: 15.5px; color: var(--text-soft); margin: 0; max-width: 78ch; }

  /* ---- НАВЫКИ ---- */
  .skills { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
  .skill-group {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px;
  }
  .skill-group h4 {
    margin: 0 0 10px; font-size: 12px; font-weight: 800; letter-spacing: .06em;
    text-transform: uppercase; color: var(--muted);
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 12.5px; font-weight: 500; color: var(--chip-text); background: var(--chip-bg);
    border: 1px solid transparent; padding: 5px 10px; border-radius: 8px;
  }
  .chip.accent { background: var(--accent-soft); color: var(--accent-ink); border-color: color-mix(in srgb, var(--accent) 22%, transparent); }

  /* ---- ХАЙЛАЙТЫ ---- */
  .highlights { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  .hl {
    position: relative; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 18px 18px 18px; box-shadow: var(--shadow-sm);
    transition: transform .16s ease, border-color .16s ease;
  }
  .hl:hover { transform: translateY(-2px); border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }
  .hl .num {
    display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px;
    border-radius: 9px; font-weight: 800; font-size: 13px; margin-bottom: 10px;
    color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  }
  .hl h4 { margin: 0 0 6px; font-size: 14.5px; font-weight: 700; color: var(--text); }
  .hl p { margin: 0; font-size: 13.5px; color: var(--text-soft); }

  /* ---- ОПЫТ (таймлайн) ---- */
  .exp-intro { font-size: 14.5px; color: var(--text-soft); margin: 0 0 22px; }
  .timeline { position: relative; padding-left: 26px; }
  .timeline::before {
    content: ""; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 2px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2), transparent);
    border-radius: 2px;
  }
  .exp {
    position: relative; margin-bottom: 18px; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px;
    transition: border-color .16s ease, box-shadow .16s ease;
  }
  .exp:hover { border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); box-shadow: var(--shadow-sm); }
  .exp::before {
    content: ""; position: absolute; left: -23px; top: 24px; width: 12px; height: 12px;
    border-radius: 50%; background: var(--surface);
    border: 3px solid var(--accent); box-shadow: 0 0 0 4px var(--bg);
  }
  .exp-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 14px; }
  .exp-head h3 { margin: 0; font-size: 16.5px; font-weight: 800; letter-spacing: -.01em; color: var(--text); flex: 1 1 60%; }
  .exp-period { font-size: 12.5px; font-weight: 600; color: var(--muted); white-space: nowrap; }
  .exp-role {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
    font-size: 12px; font-weight: 700; color: var(--accent-ink);
    background: var(--accent-soft); padding: 4px 10px; border-radius: 999px;
    border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
  }
  .exp-role.lead { color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; }
  .exp-meta { font-size: 12px; color: var(--muted); margin: 10px 0 0; font-weight: 500; }
  .exp ul { margin: 12px 0 0; padding: 0; list-style: none; }
  .exp li {
    position: relative; padding-left: 20px; font-size: 13.7px; color: var(--text-soft); margin-bottom: 7px;
  }
  .exp li::before {
    content: ""; position: absolute; left: 2px; top: 9px; width: 6px; height: 6px;
    border-radius: 2px; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  }
  .exp .stack { margin-top: 14px; }

  /* ---- ДВУХКОЛОНОЧНЫЙ НИЗ ---- */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .side .item { margin-bottom: 14px; }
  .side .item:last-child { margin-bottom: 0; }
  .side h4 { margin: 0 0 4px; font-size: 14px; font-weight: 700; color: var(--text); }
  .side p { margin: 0; font-size: 13.5px; color: var(--text-soft); }
  .lang-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px dashed var(--border); }
  .lang-row:last-child { border-bottom: 0; }
  .lang-row .lvl { font-size: 12.5px; font-weight: 600; color: var(--accent-ink); }

  .footer-note {
    margin-top: 34px; padding: 14px 18px; border-radius: 12px;
    background: var(--surface-2); border: 1px dashed var(--border);
    font-size: 12.5px; color: var(--muted); font-style: italic;
  }

  @media (max-width: 720px) {
    .grid-2 { grid-template-columns: 1fr; gap: 20px; }
    .exp-head h3 { flex: 1 1 100%; }
  }

  /* ============ ПЕЧАТЬ / PDF ============ */
  @page { size: A4; margin: 12mm 12mm; }
  @media print {
    :root, [data-theme="dark"] {
      --bg: #fff; --bg-grad: #fff; --surface: #fff; --surface-2: #fff;
      --text: #0b1020; --text-soft: #1f2937; --muted: #4b5563; --border: #d7dbe6;
      --accent: #4f46e5; --accent-2: #7c3aed; --accent-soft: #eef0ff; --accent-ink: #3730a3;
      --chip-bg: #f1f3f9; --chip-text: #374151; --shadow: none; --shadow-sm: none;
    }
    html, body { background: #fff !important; }
    body { font-size: 11.4px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .toolbar { display: none !important; }
    .page {
      max-width: none; margin: 0; border: 0; border-radius: 0; box-shadow: none;
    }
    .hero { padding: 0 0 16px; border-bottom: 1.5px solid var(--accent); }
    .hero .name { font-size: 26px; -webkit-text-fill-color: #3730a3; color: #3730a3; }
    .body { padding: 16px 0 0; }
    section { margin-top: 18px; break-inside: avoid-page; }
    .sec-title { margin-bottom: 10px; }
    .metric, .hl, .skill-group, .exp, .metric:hover, .hl:hover, .exp:hover { box-shadow: none; transform: none; }
    .exp, .hl, .skill-group, .metric { break-inside: avoid; }
    .timeline { break-inside: auto; }
    .metric .v, .hl .num, .exp-role.lead, .seg button.active { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    a { color: var(--text-soft); text-decoration: none; }
    .footer-note { background: #f6f7fb; }
  }
</style>
</head>

  if (c.email)    items.push(`<a class="contact" href="mailto:${esc(c.email)}">${ICONS.email}${esc(c.email)}</a>`);
  if (c.phone)    items.push(`<a class="contact" href="tel:${esc(c.phone)}">${ICONS.phone}${esc(c.phone)}</a>`);
  if (c.telegram) items.push(`<a class="contact" href="https://t.me/${esc(c.telegram.replace(/^@/, ""))}">${ICONS.telegram}${esc(c.telegram)}</a>`);
  if (c.github)   items.push(`<a class="contact" href="https://${esc(c.github.replace(/^https?:\/\//, ""))}">${ICONS.github}${esc(c.github)}</a>`);
  if (c.linkedin) items.push(`<a class="contact" href="https://${esc(c.linkedin.replace(/^https?:\/\//, ""))}">${ICONS.linkedin}${esc(c.linkedin)}</a>`);
  if (c.site)     items.push(`<a class="contact" href="https://${esc(c.site.replace(/^https?:\/\//, ""))}">${ICONS.site}${esc(c.site)}</a>`);
  return `<div class="contacts">${items.join("")}</div>`;
}

function render() {
  const t = T[LANG];
  document.documentElement.lang = t.htmlLang;
  document.title = `${CONFIG.name[LANG]} · ${t.titleLine[0]}`;

  const hero = `
    <header class="hero">
      <h1 class="name">${esc(CONFIG.name[LANG])}</h1>
      <p class="role">${esc(t.titleLine[0])}<span class="dot">·</span>${esc(t.titleLine[1])}</p>
      ${buildContacts()}
      <div class="metrics">
        ${t.metrics.map(m => `<div class="metric"><div class="v">${esc(m.v)}</div><div class="l">${esc(m.l)}</div></div>`).join("")}
      </div>
    </header>`;

  const about = `
    <section><h2 class="sec-title">${esc(t.ui.about)}</h2>
      <p class="summary">${esc(t.summary)}</p>
    </section>`;

  const skills = `
    <section><h2 class="sec-title">${esc(t.ui.skills)}</h2>
      <div class="skills">
        ${t.skills.map(g => `<div class="skill-group"><h4>${esc(g.h)}</h4>${chips(g.items, g.accent)}</div>`).join("")}
      </div>
      <div class="skill-group" style="margin-top:14px">
        <h4>${esc(t.ui.growing)}</h4>${chips(t.growing, true)}
      </div>
    </section>`;

  const highlights = `
    <section><h2 class="sec-title">${esc(t.ui.highlights)}</h2>
      <div class="highlights">
        ${t.highlights.map((h, i) => `<div class="hl"><span class="num">${i + 1}</span><h4>${esc(h.t)}</h4><p>${esc(h.d)}</p></div>`).join("")}
      </div>
    </section>`;

  const experience = `
    <section><h2 class="sec-title">${esc(t.ui.experience)}</h2>
      <p class="exp-intro"><strong>${esc(t.expHeader.role)} · ${esc(CONFIG.company[LANG])}</strong> · ${esc(t.expHeader.period)}<br>${esc(t.expIntro)}</p>
      <div class="timeline">
        ${t.experience.map(e => `
          <article class="exp">
            <div class="exp-head">
              <h3>${esc(e.title)}</h3>
              <span class="exp-period">${esc(e.period)}</span>
            </div>
            <span class="exp-role${e.lead ? " lead" : ""}">${esc(e.role)}</span>
            <p class="exp-meta">${esc(e.meta)}</p>
            <ul>${e.bullets.map(b => `<li>${esc(b)}</li>`).join("")}</ul>
            <div class="stack">${chips(e.stack)}</div>
          </article>`).join("")}
      </div>
    </section>`;

  const bottom = `
    <div class="grid-2">
      <section style="margin-top:0" class="side">
        <h2 class="sec-title">${esc(t.ui.side)}</h2>
        ${t.side.map(s => `<div class="item"><h4>${esc(s.t)}</h4><p>${esc(s.d)}</p></div>`).join("")}
      </section>
      <section style="margin-top:0" class="side">
        <h2 class="sec-title">${esc(t.ui.langs)}</h2>
        ${t.languages.map(l => `<div class="lang-row"><span>${esc(l.l)}</span><span class="lvl">${esc(l.v)}</span></div>`).join("")}
        <h2 class="sec-title" style="margin-top:24px">${esc(t.ui.edu)}</h2>
        <div class="item"><h4>${esc(t.edu.school)}</h4><p>${esc(t.edu.note)}</p></div>
      </section>
    </div>`;

  const note = `<div class="footer-note">${esc(t.note)}</div>`;

  document.getElementById("page").innerHTML = hero + `<div class="body">${about}${skills}${highlights}${experience}${bottom}${note}</div>`;

  // UI labels
  document.getElementById("dl-ru-label").textContent = t.ui.dlRu;
  document.getElementById("dl-en-label").textContent = t.ui.dlEn;
  document.getElementById("theme-btn").title = t.ui.theme;
  document.getElementById("lang-ru").classList.toggle("active", LANG === "ru");
  document.getElementById("lang-en").classList.toggle("active", LANG === "en");
}

function applyTheme() {
  document.documentElement.setAttribute("data-theme", THEME);
  document.getElementById("theme-icon").innerHTML = THEME === "dark" ? SUN : MOON;
}

function setLang(l) { LANG = l; localStorage.setItem("cv-lang", l); render(); }

function downloadPDF(lang) {
  const prev = LANG;
  if (lang !== LANG) setLang(lang);
  const fname = `${CONFIG.name[lang].replace(/\s+/g, "_")}_Frontend_CV_${lang.toUpperCase()}`;
  const restore = document.title;
  document.title = fname;
  // дать браузеру отрисовать новый язык перед печатью
  setTimeout(() => {
    window.print();
    document.title = restore;
    if (prev !== lang) setLang(prev);
  }, 120);
}

// ---- слушатели ----
document.getElementById("lang-ru").addEventListener("click", () => setLang("ru"));
document.getElementById("lang-en").addEventListener("click", () => setLang("en"));
document.getElementById("dl-ru").addEventListener("click", () => downloadPDF("ru"));
document.getElementById("dl-en").addEventListener("click", () => downloadPDF("en"));
document.getElementById("theme-btn").addEventListener("click", () => {
  THEME = THEME === "dark" ? "light" : "dark";
  localStorage.setItem("cv-theme", THEME);
  applyTheme();
});

applyTheme();
render();
</script>
</body>
</html>
